<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="656" height="464" viewBox="0 0 656 464">
  <rect width="100%" height="100%" fill="#1d1c2b"/>
  <g fill="#cdd6f4" font-family="monospace" font-size="14">
    <text x="16" y="25" xml:space="preserve">  # one shelf. every format.</text>
    <text x="16" y="43" xml:space="preserve"></text>
    <text x="16" y="61" xml:space="preserve">  mereader-tui keeps local books, calibre libraries, reading progress, and</text>
    <text x="16" y="79" xml:space="preserve">  bookmarks in one keyboard-driven interface.</text>
    <text x="16" y="97" xml:space="preserve"></text>
    <text x="16" y="115" xml:space="preserve">  ## library</text>
    <text x="16" y="133" xml:space="preserve"></text>
    <text x="16" y="151" xml:space="preserve">  scan an ordinary folder or a calibre library. duplicate formats are grouped</text>
    <text x="16" y="169" xml:space="preserve">  as one book, with epub preferred when it is available.</text>
    <text x="16" y="187" xml:space="preserve"></text>
    <text x="16" y="205" xml:space="preserve">  ## reader</text>
    <text x="16" y="223" xml:space="preserve"></text>
    <text x="16" y="241" xml:space="preserve">  search  with  regular  expressions,  follow  the  table  of  contents,  save</text>
    <text x="16" y="259" xml:space="preserve">  bookmarks,</text>
    <text x="16" y="277" xml:space="preserve">  and render covers without leaving the terminal.</text>
    <text x="16" y="295" xml:space="preserve"></text>
    <text x="16" y="313" xml:space="preserve">  press ? for every configured key.</text>
    <text x="16" y="331" xml:space="preserve"></text>
    <text x="16" y="349" xml:space="preserve"></text>
    <text x="16" y="367" xml:space="preserve"></text>
    <text x="16" y="385" xml:space="preserve"></text>
    <text x="16" y="403" xml:space="preserve"></text>
    <text x="16" y="421" xml:space="preserve"></text>
    <text x="16" y="439" xml:space="preserve"></text>
  </g>
</svg>
